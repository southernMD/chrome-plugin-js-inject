<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>脚本管理</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="app">
        <div class="header">
            <div>
                <h1>脚本管理</h1>
            </div>
            <div class="header-actions">
                <button id="guide-btn" class="secondary-btn" type="button">使用说明</button>
                <button id="import-script-btn" class="secondary-btn" type="button">导入脚本</button>
                <button id="reload-btn" class="primary-btn" type="button">加载刷新</button>
            </div>
        </div>

        <div id="script-list" class="script-list"></div>

        <template id="script-item-template">
            <section class="script-card">
                <div class="script-meta">
                    <input class="script-name-input" type="text" />
                    <div class="script-subtitle"></div>
                </div>

                <div class="script-card__actions">
                    <button class="primary-btn run-script-btn" type="button">在当前页面执行</button>
                    <button class="secondary-btn open-script-btn" type="button">打开本地文件</button>
                    <button class="secondary-btn bookmark-script-btn" type="button">加入书签</button>
                    <button class="danger-btn delete-script-btn" type="button">删除</button>
                </div>

                <div class="script-status"></div>
            </section>
        </template>
    </div>

    <script src="popup.js"></script>
</body>

</html>
